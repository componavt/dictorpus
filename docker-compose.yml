name: legacy-sites

services:
  mariadb:
    image: mariadb:12.1
    container_name: dictorpus-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MARIADB_DATABASE: vepkar
      MARIADB_USER: vepkar
      MARIADB_PASSWORD: ${DB_PASSWORD}
# вернуть, если нужен внешний проброс
#    ports:
#      - "${DB_PORT}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - dictorpus-network

  web:
    build: 
      context: ${DICTORPUS_PATH}
    container_name: dictorpus-web
    environment:
      TZ: Europe/Moscow
    restart: unless-stopped
    depends_on:
      - mariadb
    # УБИРАЕМ внешний порт (будет доступен только через nginx)
    expose:
      - "80"
    volumes:
    # Работало с обратными слешами (Windows-стиль)
    # - E:\projects\dictorpus:/var/www/html
    # Используем Unix-стиль — стабильнее для WSL2
      - ${DICTORPUS_PATH}:/var/www/html
      - ./apache/timeout.conf:/etc/apache2/conf-enabled/timeout.conf:ro
    networks:
      - dictorpus-network

  topkar-web:
    build: ${TOPKAR_PATH}
    container_name: topkar-web
    environment:
      TZ: Europe/Moscow
    restart: unless-stopped
    depends_on:
      - mariadb
    # УБИРАЕМ внешний порт (будет доступен только через nginx)
    expose:
      - "80"
    volumes:
      - ${TOPKAR_PATH}:/var/www/html
    networks:
      - dictorpus-network

  nginx-proxy:
    image: nginx:alpine
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "${HTTP_PORT}:80"
    depends_on:
      - web
      - topkar-web
    networks:
      - dictorpus-network
    command: >
      sh -c "echo 'events { worker_connections 1024; }
      http {
        server {
          listen 80;
          server_name dictorpus.local;
          location / {
            proxy_pass http://dictorpus-web:80;
            proxy_set_header Host \$$host;
            proxy_set_header X-Real-IP \$$remote_addr;
          }
        }
        server {
          listen 80;
          server_name topkar.local;
          location / {
            proxy_pass http://topkar-web:80;
            proxy_set_header Host \$$host;
            proxy_set_header X-Real-IP \$$remote_addr;
          }
        }
      }' > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"

volumes:
  mariadb_data:
    driver: local

networks:
  dictorpus-network:
    driver: bridge

